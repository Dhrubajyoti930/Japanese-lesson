<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>にほんご たどく ぷれーやー</title>
    <style>
        :root {
            --bg-pastel: #fff9e6;
            --primary-pink: #ff99aa;
            --secondary-blue: #a3d8f4;
            --text-color: #5a4a42;
            --white: #ffffff;
        }

        body {
            background-color: var(--bg-pastel);
            color: var(--text-color);
            font-family: 'Zen Maru Gothic', 'Sawarabi Gothic', sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        header { text-align: center; margin-bottom: 10px; }
        h1 { font-size: 1.5rem; color: var(--primary-pink); text-shadow: 2px 2px var(--white); }

        .story-card {
            background: var(--white);
            width: 100%;
            max-width: 450px;
            min-height: 300px;
            border-radius: 25px;
            border: 6px solid var(--secondary-blue);
            padding: 25px;
            box-sizing: border-box;
            box-shadow: 0 8px 0px rgba(163, 216, 244, 0.3);
            margin-bottom: 20px;
            text-align: center;
        }

        #emoji-display { font-size: 4.5rem; margin-bottom: 15px; display: block; }

        #story-text {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2px;
            font-size: 1.5rem;
            line-height: 2.2;
            font-weight: bold;
        }

        .char {
            display: inline-block;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), color 0.2s;
            padding: 0 1px;
            position: relative;
        }

        /* Character Lift Effect - No Background Highlight */
        .char.active {
            color: var(--primary-pink);
            transform: translateY(-18px) scale(1.4);
            z-index: 10;
        }

        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 450px;
        }

        .btn {
            border: none;
            border-radius: 50px;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 0px rgba(0,0,0,0.1);
            color: white;
            font-family: inherit;
        }

        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0px rgba(0,0,0,0.1); }
        .btn-stories { background-color: var(--primary-pink); grid-column: span 2; }
        .btn-play { background-color: #8ed35d; }
        .btn-stop { background-color: #ffb347; }

        #menu-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,249,230,0.98);
            z-index: 100;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .story-list-btn {
            display: block;
            width: 100%;
            background: var(--white);
            border: 4px solid var(--secondary-blue);
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: left;
        }
    </style>
</head>
<body>

<header><h1>📖 にほんご・たどく</h1></header>

<div class="story-card">
    <div id="emoji-display">✨</div>
    <div id="story-text">「はなし」を えらんでね！</div>
</div>

<div class="button-grid">
    <button class="btn btn-stories" onclick="openMenu()">🌟 はなしを えらぶ</button>
    <button class="btn btn-play" onclick="startReading()">▶ きく</button>
    <button class="btn btn-stop" onclick="stopReading()">■ とめる</button>
</div>

<div id="menu-overlay">
    <div style="font-size:1.4rem; color:var(--primary-pink); text-align:center; font-weight:bold; margin-bottom:20px;">どれを よむ？</div>
    <div id="list-container"></div>
    <button class="btn" style="background:var(--text-color); width:100%; margin-top:10px;" onclick="closeMenu()">もどる</button>
</div>

<script>
    const stories = [
{ t: "ふく", e: "👒", s: ["おでかけです。", "ぼうしを", "かぶりましょう。", "あかい", "ぼうし、", "あおい", "ぼうし。", "どれが", "いいですか。"] },
{ t: "なにを しますか", e: "👓", s: ["あさ", "おきます。", "めがねを", "かけます。", "かおを", "あらいます。", "それから", "ごはんを", "たべます。"] },
{ t: "とり", e: "🐦", s: ["きの上に", "とりが", "います。", "きいろい", "とりです。", "きれいに", "うたいます。", "ピーピー、", "ないています。"] },
{ t: "あめ", e: "🌂", s: ["あめが", "ふってきました。", "あおい", "かさを", "さします。", "あめの", "おとが", "きこえます。", "ピチピチ、", "チャプチャプ。"] },
{ t: "わたしの へや", e: "🚪", s: ["わたしの", "へやです。", "ドアを", "あけます。", "なかに", "つくえが", "あります。", "いすも", "あります。"] },
{ t: "かばんの なか", e: "📒", s: ["かばんを", "あけます。", "なかに", "ノートが", "あります。", "ペンも", "あります。", "じしょも", "あります。"] },
{ t: "どうぶつ", e: "🐘", s: ["どうぶつえんに", "いきました。", "とりが", "います。", "ぞうも", "います。", "みんな", "とても", "おおきいです。"] },
{ t: "くるま", e: "🚗", s: ["どうに", "くるまが", "たくさん", "あります。", "あかい", "くるまや", "しろい", "くるまが", "はしっています。"] },
{ t: "あき", e: "🍁", s: ["あきに", "なりました。", "すずしい", "かぜが", "ふきます。", "あめが", "ふったら", "かさを", "さしましょう。"] },
{ t: "がっこう", e: "🏫", s: ["がっこうへ", "いきます。", "つくえで", "べんきょうします。", "ノートに", "かんじを", "たくさん", "かきます。"] },
        

        
        { t: "ぼうしを かぶりましょう", e: "👒", s: ["おでかけです。", "ぼうしを", "かぶりましょう。", "あかい", "ぼうし、", "あおい", "ぼうし。", "どれが", "いいですか。"] },
{ t: "ドアを あけます", e: "🚪", s: ["トントン、", "だれですか。", "ドアを", "あけます。", "あ、", "ともだちの", "たなかさんです。", "こんにちは！"] },
{ t: "ほんを よみます", e: "📚", s: ["よるに", "なりました。", "しずかに", "ほんを", "よみます。", "どうぶつの", "えほんです。", "とても", "おもしろいです。"] },
{ t: "あおい かさ", e: "🌂", s: ["あめが", "ふってきました。", "あおい", "かさを", "さします。", "あめの", "おとが", "きこえます。", "ピチピチ、", "チャプチャプ。"] },
{ t: "きいろい とり", e: "🐦", s: ["きの上に", "とりが", "います。", "きいろい", "とりです。", "きれいに", "うたいます。", "ピーピー、", "ないています。"] },
        

        
        { t: "アルバイトの面接", e: "💼", s: ["今日、", "アルバイトの", "面接が", "ありました。", "とても", "緊張しましたが、", "一生懸命", "答えました。", "結果が", "楽しみです。"] },
{ t: "日本の電車", e: "🚃", s: ["日本の", "電車は", "時間が", "正確です。", "一分でも", "遅れると", "アナウンスが", "流れます。", "本当に", "すごいと", "思います。"] },
{ t: "健康のために", e: "🏃", s: ["最近、", "太ってしまったので、", "毎日", "歩くことに", "しました。", "エレベーターを", "使わずに、", "階段を", "登るように", "しています。"] },
{ t: "週末の予定", e: "📅", s: ["今週末は、", "友達と", "キャンプに", "行く予定です。", "天気が", "心配ですが、", "雨が", "降らないように", "祈っています。"] },
{ t: "引っ越し", e: "📦", s: ["来週、", "新しい", "アパートに", "引っ越します。", "荷物を", "まとめるのは", "大変ですが、", "新しい生活が", "始まるのが", "待ち遠しいです。"] },
{ t: "初めての雪", e: "❄️", s: ["私の国には", "雪が", "降りません。", "ですから、", "初めて", "雪を", "見た時は、", "あまりの", "美しさに", "感動しました。"] },
{ t: "コンビニの便利さ", e: "🏪", s: ["コンビニでは、", "食べ物だけでなく、", "公共料金の", "支払いも", "できます。", "二十四時間", "開いているので、", "とても", "助かります。"] },
{ t: "日本語の勉強", e: "📖", s: ["日本語を", "勉強し始めて", "一年が", "経ちました。", "漢字は", "難しいですが、", "読めるようになると", "面白いと", "感じるように", "なりました。"] },
{ t: "落とし物", e: "👛", s: ["道で", "財布を", "拾ったので、", "交番に", "届けました。", "持ち主が", "見つかると", "いいなと", "願っています。"] },
{ t: "将来の夢", e: "🌟", s: ["将来、", "日本で", "働くのが", "私の夢です。", "そのためには、", "もっと", "日本語を", "上手に", "話せるように", "ならなければなりません。"] },
        
        { t: "おかし", e: "🍪", s: ["クッキーを", "つくりました。", "あまくて", "いいにおいです。", "おとうとと", "いっしょに", "たべました。"] },
{ t: "ようふく", e: "👗", s: ["きょうは", "あおいいろの", "ワンピースを", "きまず。", "しろいくつを", "はきます。", "おでかけします。"] },
{ t: "なつのうみ", e: "🏖️", s: ["なつやすみに", "うみへ", "いきました。", "すいかわりを", "しました。", "とても", "あつかったです。"] },
{ t: "あめの日", e: "☔", s: ["あめが", "ふっています。", "ながぐつを", "はきます。", "かさを", "さします。", "みずたまりで", "あそびます。"] },
{ t: "ぼくのゆめ", e: "🚀", s: ["ぼくは", "うちゅうに", "いきたいです。", "ロケットに", "のりたいです。", "ほしを", "たくさん", "みたいです。"] },
{ t: "おべんとう", e: "🍱", s: ["きょうの", "おべんとうは", "おむすびです。", "たこさんの", "ウィンナーも", "あります。", "うれしいです。"] },
{ t: "ゆきだるま", e: "☃️", s: ["ゆきが", "ふりました。", "そとで", "ゆきだるまを", "つくりました。", "てが", "つめたかったです。"] },
{ t: "おふろ", e: "🛁", s: ["おふろに", "はいります。", "あひるの", "おもちゃと", "いっしょです。", "きもちが", "いいですよ。"] },
{ t: "むしめがね", e: "🔍", s: ["むしめがねで", "はなを", "みます。", "ありが", "あるいています。", "ちいさい", "せかいです。"] },
{ t: "おんがく", e: "🎹", "s": ["ピアノを", "ひきます。", "うたを", "うたいます。", "みんなで", "おんがくを", "たのしみましょう。"] },
{ t: "あきのかぜ", e: "🎐", s: ["すずしい", "かぜが", "ふきました。", "トンボが", "とんでいます。", "あきに", "なりましたね。"] },
{ t: "おかいもの", e: "🛒", s: ["スーパーに", "いきました。", "にんじんと", "たまねぎを", "かいました。", "カレーを", "つくります。"] },
{ t: "ゆうえんち", e: "🎡", s: ["ゆうえんちに", "いきました。", "かんらんしゃに", "のりました。", "まちが", "ちいさく", "みえました。"] },
{ t: "ねこ", e: "🐱", s: ["しろい", "ねこが", "います。", "ひなたぼっこを", "しています。", "ふわふわで", "かわいいです。"] },
{ t: "あさのこうえん", e: "🌳", s: ["あさ", "こうえんを", "はしります。", "とりが", "ないています。", "くうきが", "おいしいです。"] },
{ t: "おまつり", e: "🏮", s: ["おまつりに", "いきました。", "わたあめを", "たべました。", "はなびが", "とても", "きれいでした。"] },
{ t: "やまのぼり", e: "⛰️", s: ["やまに", "のぼりました。", "おにぎりを", "たべました。", "てっぺんは", "かぜが", "つよかったです。"] },
{ t: "じてんしゃ", e: "🚲", s: ["じてんしゃに", "のります。", "はやく", "はしれます。", "ヘルメットを", "しっかり", "かぶります。"] },
{ t: "いろえんぴつ", e: "🖍️", s: ["あかい", "くるまを", "かきました。", "あおい", "そらを", "かきました。", "きいろい", "はなも", "かきました。"] },
{ t: "おやすみなさい", e: "🌙", s: ["もう", "よるです。", "はを", "みがきます。", "パジャマを", "きます。", "おやすみなさい。"] },
        
        { t: "わたしの いちにち", e: "☀️", s: ["あさ、", "おきます。", "かおを", "あらいます。", "ごはんを", "たべます。", "おちゃを", "のみます。"] },
        { t: "かぞく", e: "👨‍👩‍👧‍👦", s: ["わたしの", "家族は", "四人です。", "父と", "母と", "姉と", "わたしです。", "犬もいます。"] },
        { t: "たべもの", e: "🍣", s: ["おすしが", "大好きです。", "月曜日に", "食べました。", "おいしかったです。", "ラーメンも", "好きです。"] },
        { t: "おてんき", e: "🌈", s: ["きょうは", "はれです。", "とても", "あついです。", "あしたは", "あめです。", "すこし", "さむいです。"] },
        { t: "かいもの", e: "🛍️", s: ["デパートへ", "行きました。", "赤い", "かばんを", "買いました。", "五千円でした。", "きれいです。"] }
    ];

    let currentStoryPhrases = [];
    let totalCharSpans = [];
    let isPlaying = false;
    let currentPhraseIndex = -1;
    let globalCharOffset = 0;

    const synth = window.speechSynthesis;
    const emojiDisplay = document.getElementById('emoji-display');
    const storyContainer = document.getElementById('story-text');
    const overlay = document.getElementById('menu-overlay');

    stories.forEach((item) => {
        const b = document.createElement('button');
        b.className = 'story-list-btn';
        b.innerText = `${item.e} ${item.t}`;
        b.onclick = () => {
            emojiDisplay.innerText = item.e;
            currentStoryPhrases = item.s;
            renderCharacters();
            closeMenu();
        };
        document.getElementById('list-container').appendChild(b);
    });

    function renderCharacters() {
        stopReading();
        storyContainer.innerHTML = '';
        totalCharSpans = [];
        let counter = 0;

        currentStoryPhrases.forEach((phrase) => {
            phrase.split('').forEach((char) => {
                const span = document.createElement('span');
                span.className = 'char';
                span.innerText = char;
                span.id = `char-${counter}`;
                storyContainer.appendChild(span);
                totalCharSpans.push(span);
                counter++;
            });
            const spacer = document.createElement('span');
            spacer.innerHTML = '&nbsp;';
            storyContainer.appendChild(spacer);
        });
        currentPhraseIndex = -1;
        globalCharOffset = 0;
    }

    function openMenu() { overlay.style.display = 'block'; }
    function closeMenu() { overlay.style.display = 'none'; }

    function startReading() {
        if (totalCharSpans.length === 0 || isPlaying) return;
        isPlaying = true;
        currentPhraseIndex = 0;
        globalCharOffset = 0;
        readNext();
    }
    
function readNext() {
    if (!isPlaying || currentPhraseIndex >= currentStoryPhrases.length) {
        stopReading();
        return;
    }

    const text = currentStoryPhrases[currentPhraseIndex];
    const len = text.length;
    const utter = new SpeechSynthesisUtterance(text);
    
    // FORCE JAPANESE HERE
    utter.lang = 'ja-JP'; 
    
    const voices = synth.getVoices();
    // Look for a voice that specifically supports Japanese
    const jpVoice = voices.find(v => v.lang === 'ja-JP' || v.lang === 'ja_JP');
    if (jpVoice) {
        utter.voice = jpVoice;
    }

    utter.rate = 0.75; // Keeping your slow pace for learners

    let charIdx = 0;
    const timer = setInterval(() => {
        if (!isPlaying) { clearInterval(timer); return; }
        if (charIdx < len) {
            totalCharSpans.forEach(el => el.classList.remove('active'));
            if(totalCharSpans[globalCharOffset]) {
                totalCharSpans[globalCharOffset].classList.add('active');
            }
            globalCharOffset++;
            charIdx++;
        } else {
            clearInterval(timer);
        }
    }, 200); // Slightly increased to match natural Japanese mora timing

    utter.onend = () => {
        totalCharSpans.forEach(el => el.classList.remove('active'));
        currentPhraseIndex++;
        setTimeout(readNext, 300); // Short pause between phrases
    };
    synth.speak(utter);
}


    function stopReading() {
        isPlaying = false;
        synth.cancel();
        totalCharSpans.forEach(el => el.classList.remove('active'));
    }

    window.speechSynthesis.onvoiceschanged = () => synth.getVoices();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>J-Flash Pro | Emojis Restored</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-ruby: #94a3b8;
            --accent: #22c55e;
            --secondary: #334155;
            --safe-area-bottom: env(safe-area-inset-bottom);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation; 
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #session-info {
            font-size: 0.75rem;
            color: var(--text-ruby);
            margin-bottom: 12px;
            font-weight: 700;
            letter-spacing: 0.1em;
        }

        #card {
            background: var(--card-bg);
            width: 100%;
            max-width: 360px;
            aspect-ratio: 4/5;
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5);
            position: relative;
            cursor: pointer;
            transition: transform 0.1s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            z-index: 10;
        }

        #card:active { transform: scale(0.96); }

        #display-text {
            font-size: clamp(1.4rem, 8vw, 2.4rem);
            font-weight: 700;
            line-height: 2.4;
            text-align: center;
        }

        .word-chunk { display: inline-block; margin: 0 3px; transition: color 0.3s ease; }
        .active-word { color: var(--accent); }

        ruby { ruby-align: center; }
        rt { font-size: 0.45em; color: var(--text-ruby); font-weight: 500; }

        #progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 6px;
            background: var(--accent);
            width: 0%;
            transition: width 0.4s ease;
            border-radius: 32px 32px 0 0;
        }

        #vocab-container {
            width: 100%;
            max-width: 360px;
            margin-top: 1.5rem;
            opacity: 0;
            transition: all 0.4s ease;
            transform: translateY(10px);
            padding-bottom: calc(30px + var(--safe-area-bottom));
        }

        #vocab-container.visible { opacity: 1; transform: translateY(0); }

        .vocab-item {
            background: var(--secondary);
            margin-bottom: 10px;
            padding: 16px 20px;
            border-radius: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .vocab-item:active { transform: scale(0.97); background-color: #475569; }

        #status {
            margin-top: 1rem;
            font-size: 0.65rem;
            color: #64748b;
            letter-spacing: 0.15em;
        }

        .emoji-pop {
            position: fixed;
            font-size: 2.8rem;
            pointer-events: none;
            z-index: 100;
            animation: floatUp 1.2s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { opacity: 1; transform: translateY(-20px) scale(1.2); }
            100% { transform: translateY(-120px) scale(1); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="session-info">SESSION: 0 / 3</div>

    <div id="card">
        <div id="progress-bar"></div>
        <div id="display-text">START</div>
    </div>
    
    <div id="status">READY</div>
    <div id="vocab-container"></div>

    <script>
        const displayElement = document.getElementById('display-text');
        const progressBar = document.getElementById('progress-bar');
        const vocabContainer = document.getElementById('vocab-container');
        const statusText = document.getElementById('status');
        const sessionText = document.getElementById('session-info');
        
        const pool = [
            { text: "日[に]本[ほん]に 行[い]きたいです。", emojis: ["🇯🇵", "✈️"], vocab: [{ word: "日本", reading: "にほん", mean: "Japan" }, { word: "行きたい", reading: "いきたい", mean: "Want to go" }] },
            { text: "朝[あさ]ご飯[ごはん]を 食[た]べましたか？", emojis: ["🥣", "🍳"], vocab: [{ word: "朝ご飯", reading: "あさごはん", mean: "Breakfast" }, { word: "食べた", reading: "たべた", mean: "Ate" }] },
            { text: "水[みず]を 飲[の]んでも いいですか？", emojis: ["🚰", "🙋‍♂️"], vocab: [{ word: "水", reading: "みず", mean: "Water" }, { word: "飲んでもいい", reading: "のんでもいい", mean: "May drink" }] },
            { text: "今日[きょう]は 暑[あつ]いですね。", emojis: ["☀️", "🥵"], vocab: [{ word: "今日", reading: "きょう", mean: "Today" }, { word: "暑い", reading: "あつい", mean: "Hot" }] },
            { text: "一[いっ]緒[しょ]に 遊[あそ]びましょう。", emojis: ["🤝", "🎮"], vocab: [{ word: "一緒に", reading: "いっしょに", mean: "Together" }, { word: "遊びましょう", reading: "あそびましょう", mean: "Let's play" }] }
        ];

        let activeSession = [];
        let currentIndex = -1;
        let isRunning = false;

        function initializeSession() {
            const shuffled = [...pool].sort(() => 0.5 - Math.random());
            activeSession = shuffled.slice(0, 3);
            currentIndex = 0;
        }

        function speak(text, rate = 1.0) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ja-JP';
            msg.rate = rate;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(msg);
        }

        async function runFlashcard() {
            if (isRunning) return;
            isRunning = true;

            vocabContainer.classList.remove('visible');
            const selectedData = activeSession[currentIndex];
            sessionText.innerText = `SESSION: ${currentIndex + 1} / 3`;
            
            const regex = /([^\s\[\]]+)(?:\[([^\[\]]+)\])?/g;
            let match, chunks = [];
            while ((match = regex.exec(selectedData.text)) !== null) {
                chunks.push({ text: match[1], reading: match[2] || "" });
            }

            displayElement.innerHTML = "";
            progressBar.style.width = "0%";

            for (let i = 0; i < chunks.length; i++) {
                const chunk = chunks[i];
                const span = document.createElement('span');
                span.className = 'word-chunk active-word';
                span.innerHTML = `<ruby>${chunk.text}<rt>${chunk.reading}</rt></ruby>`;
                displayElement.appendChild(span);
                
                // RESTORED: Create emoji from the pool
                if(selectedData.emojis.length > 0) createEmoji(selectedData.emojis);
                
                speak(chunk.text, 1.0);
                
                progressBar.style.width = `${((i + 1) / chunks.length) * 50}%`;
                const wait = 450 + (chunk.reading.length || chunk.text.length) * 150;
                await new Promise(r => setTimeout(r, wait));
                span.classList.remove('active-word');
            }

            progressBar.style.width = "100%";
            statusText.innerText = "NATURAL FLOW";
            await new Promise(r => setTimeout(r, 600));
            
            speak(chunks.map(c => c.text).join(''), 0.9);
            await new Promise(r => setTimeout(r, 1800));
            
            showVocab(selectedData.vocab);

            if (currentIndex >= 2) {
                initializeSession(); 
                statusText.innerText = "SESSION COMPLETE! TAP TO RESTART";
            } else {
                currentIndex++;
                statusText.innerText = "TAP FOR NEXT";
            }
            isRunning = false;
        }

        function showVocab(list) {
            vocabContainer.innerHTML = "";
            list.forEach(v => {
                const item = document.createElement('div');
                item.className = 'vocab-item';
                item.innerHTML = `<span class="vocab-jp">${v.word}</span><span class="vocab-en">${v.mean}</span>`;
                item.onclick = (e) => { e.stopPropagation(); speak(v.word, 1.0); };
                vocabContainer.appendChild(item);
            });
            vocabContainer.classList.add('visible');
        }

        // RESTORED: Random emoji from list
        function createEmoji(emojiList) {
            const emoji = document.createElement('div');
            emoji.className = 'emoji-pop';
            emoji.innerText = emojiList[Math.floor(Math.random() * emojiList.length)];
            emoji.style.left = `${Math.random() * 60 + 20}%`;
            emoji.style.top = `40%`;
            document.body.appendChild(emoji);
            setTimeout(() => emoji.remove(), 1200);
        }

        document.getElementById('card').addEventListener('click', runFlashcard);
        window.addEventListener('load', () => initializeSession());
    </script>
</body>
</html>
